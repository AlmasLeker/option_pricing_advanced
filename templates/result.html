<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Option Pricing Results</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f9;
            padding: 40px;
            color: #2c3e50;
        }
        .results {
            background-color: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            max-width: 500px;
        }
        .results h2 {
            text-align: center;
            color: #3498db;
            margin-bottom: 20px;
        }
        .results p {
            font-size: 16px;
            margin: 8px 0;
        }
        .volatility-surface {
            background-color: #ffffff;
            padding: 20px 20px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .volatility-surface h2 {
            text-align: center;
            color: #e67e22;
        }
        #volatility-surface {
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>

    <div class="results">
        <h2>Option Pricing Results</h2>
        <p><strong>Price:</strong> {{ price }}</p>
        <p><strong>Delta:</strong> {{ delta }}</p>
        <p><strong>Gamma:</strong> {{ gamma }}</p>
        <p><strong>Vega:</strong> {{ vega }}</p>
        <p><strong>Theta:</strong> {{ theta }}</p>
    </div>

    <div class="volatility-surface">
        <h2>Volatility Surface</h2>
        {{ vol_surface_graph|safe }}
    </div>

</body>
</html>
